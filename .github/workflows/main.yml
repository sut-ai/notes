name: Deploy

on:
  push:
    branches: [ master ]

  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Webify
        uses: webifier/build@v1.0.5
        with:
          python-version: "3.13"
          index: index.yml
          baseurl: /notes
          publish_dir: webified

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allow_empty_commit: true
          publish_dir: ./webified/
          exclude_assets: '.github,README.md,LICENSE,.gitignore'
